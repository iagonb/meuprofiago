baseURL = "https://meuprofiago.com/"
languageCode = "pt-br"
title = "MeuProf.Iago"
theme = "PaperMod"

[pagination]
  pagerSize = 5

[params]
  env = "production"
  title = "MeuProf.Iago"
  description = "Física, Matemática e Data Science"
  defaultTheme = "dark"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowWordCount = false
  disableSpecial1stPost = false

  [params.label]
    text = "MeuProf.Iago"
    icon = "/profile.jpg"
    iconHeight = 35

  [[params.socialIcons]]
    name = "GitHub"
    title = "GitHub"
    url = "https://github.com/iagonb"

  [[params.socialIcons]]
    name = "linkedin"
    title = "LinkedIn"
    url = "https://www.linkedin.com/"

  [[params.socialIcons]]
    name = "instagram"
    title = "Instagram"
    url = "https://instagram.com/"

  [params.profileMode]
    enabled = true
    title = "MeuProf.Iago"
    subtitle = "Física, Matemática e Data Science."
    imageUrl = "/images/profile.jpg"
    imageTitle = "MeuProf.Iago"
    imageWidth = 120
    imageHeight = 120

    [[params.profileMode.buttons]]
      name = "Posts"
      url = "/posts"

    [[params.profileMode.buttons]]
      name = "Tags"
      url = "/tags"

[menu]
  [[menu.main]]
    identifier = "bio"
    name = "Bio"
    url = "/bio/"
    weight = 10

  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/posts/"
    weight = 20

  [[menu.main]]
    identifier = "ensino"
    name = "Ensino"
    url = "/ensino/"
    weight = 30

  [[menu.main]]
    identifier = "pesquisa"
    name = "Pesquisa"
    url = "/pesquisa/"
    weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]